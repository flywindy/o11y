apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: infra
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      url: http://tempo.infra.svc.cluster.local:3200
      isDefault: false
      jsonData:
        nodeGraph:
          enabled: true
        search:
          hide: false
        lokiSearch:
          datasourceUid: loki
        serviceMap:
          datasourceUid: prometheus
        tracesToLogsV2:
          datasourceUid: loki
          # customQuery provides the trace filter, so keep Grafana's built-in trace ID filter disabled.
          filterByTraceID: false
          filterBySpanID: false
          spanStartTimeShift: '-5m'
          spanEndTimeShift: '5m'
          tags:
            - key: service.name
              value: service_name
          customQuery: true
          query: '{service_name=~"(.*/|)$${__span.tags["service.name"]}"} |= "$${__trace.traceId}"'

    - name: Prometheus
      type: prometheus
      uid: prometheus
      access: proxy
      url: http://prometheus.infra.svc.cluster.local:9090
      jsonData:
        # exemplarTraceIdDestinations wires histogram exemplars to Tempo:
        # clicking an exemplar dot in Grafana opens the linked trace directly.
        exemplarTraceIdDestinations:
          - name: traceID
            datasourceUid: tempo

    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki.infra.svc.cluster.local:3100
      jsonData:
        derivedFields:
          - datasourceUid: tempo
            # Two log paths produce different field names:
            # - OTLP path (App → OTel Collector → Loki): Loki exporter flattens
            #   OTLP TraceID to "traceid" (all lowercase).
            # - Alloy/stdout path (App stdout → Alloy → OTel Collector → Loki):
            #   raw JSON body is preserved with "traceId" (camelCase from slog).
            # The character class [Ii] matches both.
            matcherRegex: '"trace[Ii]d"\s*:\s*"([0-9a-f]{32})"'
            name: TraceID
            url: "$${__value.raw}"
            internal: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:11.6.0
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
      volumes:
      - name: grafana-datasources
        configMap:
          name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: infra
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
