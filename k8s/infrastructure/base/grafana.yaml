apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: infra
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      url: http://tempo.infra.svc.cluster.local:3200
      isDefault: false
      jsonData:
        nodeGraph:
          enabled: true
        search:
          hide: false
        lokiSearch:
          datasourceUid: loki
        serviceMap:
          datasourceUid: prometheus

    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki.infra.svc.cluster.local:3100
      jsonData:
        derivedFields:
          - datasourceUid: tempo
            # Matches the traceid field injected by the OTel Collector Loki exporter.
            # The exporter flattens the OTel log record's TraceID into the log line
            # as "traceid" (lowercase, no separator), e.g.:
            # {"traceid":"4bf92f3577b34da6a3ce929d0e0e4736", ...}
            matcherRegex: '"traceid"\s*:\s*"([0-9a-f]{32})"'
            name: TraceID
            url: "$${__value.raw}"
            internal: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:11.6.0
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
          subPath: datasources.yaml
      volumes:
      - name: grafana-datasources
        configMap:
          name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: infra
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
