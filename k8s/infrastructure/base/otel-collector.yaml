apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
  namespace: infra
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        send_batch_size: 1000
        timeout: 1s

    exporters:
      otlp:
        endpoint: tempo.infra.svc.cluster.local:4317
        tls:
          insecure: true
      loki:
        endpoint: "http://loki.infra.svc.cluster.local:3100/loki/api/v1/push"
        default_labels_enabled:
          exporter: false
          job: true      # service.name resource attribute → job label
          instance: false
          level: true    # severity_text → level label
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
      prometheusremotewrite:
        endpoint: "http://prometheus.infra.svc.cluster.local:9090/api/v1/write"
        tls:
          insecure: true
      debug:
        verbosity: basic

    service:
      pipelines:
        # Traces flow: App → OTel Collector → Tempo
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp]
        # Logs flow (primary):   App ──OTLP/HTTP──► OTel Collector → Loki
        # Logs flow (secondary): App stdout → Alloy → OTel Collector → Loki
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [loki]
        # Metrics flow: App ──OTLP/HTTP──► OTel Collector ──prometheusremotewrite──► Prometheus
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheusremotewrite]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.121.0
        args: ["--config=/etc/otel-collector-config.yaml"]
        ports:
        - containerPort: 4317 # OTLP gRPC
        - containerPort: 4318 # OTLP HTTP
        volumeMounts:
        - name: otel-collector-conf
          mountPath: /etc/otel-collector-config.yaml
          subPath: otel-collector-config.yaml
      volumes:
      - name: otel-collector-conf
        configMap:
          name: otel-collector-conf
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: infra
spec:
  type: NodePort
  selector:
    app: otel-collector
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
    nodePort: 30000
