apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: grafana/tempo
    newName: internal-registry.example.com/grafana/tempo
  - name: otel/opentelemetry-collector-contrib
    newName: internal-registry.example.com/otel/opentelemetry-collector-contrib
  - name: nats
    newName: internal-registry.example.com/nats
  - name: mongo
    newName: internal-registry.example.com/mongo
